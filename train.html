<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>CFPS · Command Center — Random Train + Report</title>
<style>
  :root{
    --bg:#0b1622;--panel:#12233a;--panel-2:#0f1d30;--line:#1e3350;
    --ink:#e8eef6;--muted:#8aa1bd;--ember:#f2a154;--ember-dim:#c67a34;
    --water:#4ea3d6;--hot:#e06b56;--ok:#5fbf8f;--code-bg:#0a2036;
    --mono:'SFMono-Regular',ui-monospace,'Roboto Mono','Courier New',monospace;
    --sans:'Inter','Segoe UI','Malgun Gothic','Apple SD Gothic Neo',system-ui,sans-serif;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{background:var(--bg);color:var(--ink);font-family:var(--sans);line-height:1.55;
    -webkit-font-smoothing:antialiased;padding:0 0 80px}
  .wrap{max-width:1180px;margin:0 auto;padding:0 18px}
  a{color:var(--water)}

  /* header */
  header.top{padding:22px 0 12px}
  .eyebrow{font-family:var(--mono);font-size:11px;letter-spacing:.24em;text-transform:uppercase;color:var(--ember)}
  h1.title{font-size:26px;margin:2px 0 2px;font-weight:700;letter-spacing:-.01em}
  .sub{font-size:13px;color:var(--muted)}
  .sub b{color:var(--ember)}
  .metaline{font-family:var(--mono);font-size:12px;color:var(--muted);margin-top:6px}
  .metaline b{color:var(--ember)}

  /* tabs + right controls */
  .bar{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin:16px 0 6px;
    border-bottom:1px solid var(--line);padding-bottom:14px}
  .tab{font-family:var(--mono);font-size:12px;letter-spacing:.06em;text-transform:uppercase;
    background:var(--panel-2);color:var(--muted);border:1px solid var(--line);border-radius:999px;
    padding:8px 15px;cursor:pointer;transition:.15s;user-select:none}
  .tab:hover{color:var(--ink);border-color:var(--ember-dim)}
  .tab.on{background:var(--ember);color:var(--bg);border-color:var(--ember);font-weight:700}
  .spring{flex:1}
  .selwrap{position:relative}
  select#secsel{font-family:var(--mono);font-size:13px;background:var(--panel-2);color:var(--ink);
    border:1px solid var(--line);border-radius:10px;padding:9px 34px 9px 14px;cursor:pointer;
    appearance:none;-webkit-appearance:none;min-width:210px}
  .selwrap::after{content:"⌄";position:absolute;right:13px;top:5px;color:var(--muted);pointer-events:none}
  .timer{font-family:var(--mono);font-weight:700;font-size:15px;color:var(--water);
    border:1px solid var(--line);border-radius:10px;padding:8px 14px;min-width:70px;text-align:center}
  .timer.warn{color:var(--ember);border-color:var(--ember-dim)}
  .timer.crit{color:var(--hot);border-color:var(--hot)}

  section.view{display:none}
  section.view.on{display:block}

  /* stat cards */
  .stats{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin:18px 0}
  .stat{background:var(--panel-2);border:1px solid var(--line);border-radius:14px;padding:16px 14px;text-align:center}
  .stat .v{font-family:var(--mono);font-size:26px;font-weight:700;line-height:1}
  .stat .v.g{color:var(--ok)} .stat .v.e{color:var(--ember)} .stat .v.b{color:var(--water)} .stat .v.n{color:var(--muted)}
  .stat .l{font-family:var(--mono);font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);margin-top:8px}

  /* question card */
  .card{background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:20px 18px}
  .qhead{display:flex;gap:9px;align-items:center;flex-wrap:wrap;margin-bottom:12px}
  .qn{font-family:var(--mono);font-size:12px;color:var(--muted)}
  .qtag{font-family:var(--mono);font-size:11px;color:var(--water);background:var(--code-bg);
    border:1px solid var(--line);border-radius:6px;padding:2px 9px}
  .qtag.hide{color:#40567a;letter-spacing:.15em}
  .qbody{font-size:17px;line-height:1.6;margin:6px 0 18px;color:var(--ink)}

  .step{margin:16px 0 6px}
  .step .sh{display:flex;gap:9px;align-items:center;margin-bottom:6px}
  .step .num{font-family:var(--mono);font-size:12px;font-weight:700;color:var(--bg);background:var(--ember);
    width:22px;height:22px;line-height:22px;text-align:center;border-radius:6px}
  .step .st{font-family:var(--mono);font-size:12px;letter-spacing:.08em;text-transform:uppercase;color:var(--ember)}
  .step .hint{font-size:12.5px;color:var(--muted);margin:0 0 8px 31px}

  .kwrow{display:flex;gap:8px;margin-left:31px}
  #kw{flex:1;max-width:520px;font-family:var(--mono);font-size:15px;background:var(--code-bg);color:var(--ink);
    border:1px solid var(--ember-dim);border-radius:10px;padding:12px 14px;outline:none}
  #kw:focus{box-shadow:0 0 0 3px rgba(242,161,84,.12)}

  .secgrid{display:grid;grid-template-columns:repeat(5,1fr);gap:9px;margin-left:31px}
  .secbtn{background:var(--panel-2);border:1px solid var(--line);border-radius:10px;padding:11px 8px;text-align:center;
    cursor:pointer;transition:.13s;color:var(--ink)}
  .secbtn:hover{border-color:var(--ember-dim)}
  .secbtn .bn{font-family:var(--mono);font-weight:700;font-size:15px}
  .secbtn .bl{font-size:10.5px;color:var(--muted);margin-top:2px;line-height:1.25}
  .secbtn.sel{border-color:var(--ok);background:rgba(95,191,143,.10)}
  .secbtn.right{border-color:var(--ok);background:rgba(95,191,143,.16)}
  .secbtn.wrong{border-color:var(--hot);background:rgba(224,107,86,.14)}

  .chrow{display:flex;gap:8px;flex-wrap:wrap;margin-left:31px}
  .chbtn{background:var(--panel-2);border:1px solid var(--line);border-radius:9px;padding:9px 12px;cursor:pointer;
    transition:.13s;color:var(--ink);font-size:13px}
  .chbtn:hover{border-color:var(--ember-dim)}
  .chbtn b{font-family:var(--mono);color:var(--water);margin-right:5px}
  .chbtn.sel{border-color:var(--ok);background:rgba(95,191,143,.10)}
  .chbtn.right{border-color:var(--ok);background:rgba(95,191,143,.16)}
  .chbtn.wrong{border-color:var(--hot);background:rgba(224,107,86,.14)}

  .opts{display:flex;flex-direction:column;gap:9px;margin-left:31px}
  .opt{display:flex;gap:11px;align-items:flex-start;text-align:left;width:100%;background:var(--panel-2);
    border:1px solid var(--line);border-radius:10px;padding:12px 14px;color:var(--ink);font-size:14.5px;
    line-height:1.5;cursor:pointer;transition:.13s;font-family:inherit}
  .opt:hover:not(:disabled){border-color:var(--ember-dim)}
  .opt .ltr{font-family:var(--mono);font-size:12px;color:var(--muted);flex:0 0 auto;width:22px;height:22px;
    line-height:22px;text-align:center;border-radius:5px;background:var(--code-bg);border:1px solid var(--line);text-transform:uppercase}
  .opt.right{border-color:var(--ok);background:rgba(95,191,143,.12)}
  .opt.right .ltr{background:var(--ok);color:var(--bg);border-color:var(--ok)}
  .opt.wrong{border-color:var(--hot);background:rgba(224,107,86,.12)}
  .opt.wrong .ltr{background:var(--hot);color:#fff;border-color:var(--hot)}
  .opt:disabled{cursor:default;opacity:.95}

  .verdict{margin-top:18px;padding:14px 16px;border-radius:12px;border:1px solid var(--line);background:var(--code-bg);display:none}
  .verdict.show{display:block}
  .vrow{display:flex;gap:10px;align-items:baseline;font-size:13.5px;margin:3px 0}
  .vk{font-family:var(--mono);font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);width:74px;flex:0 0 auto}
  .vv .hit{color:var(--ok);font-weight:700} .vv .miss{color:var(--hot);font-weight:700}
  .vv b{color:var(--water)}
  .vpage{margin-top:10px;font-family:var(--mono);font-size:13px;color:var(--ember);
    border:1px solid var(--ember-dim);border-radius:9px;padding:10px 13px}
  .vtime{font-family:var(--mono);font-size:12px;color:var(--muted);margin-top:8px}
  .vtime b{color:var(--ink)}

  .nav{display:flex;gap:9px;margin-top:16px;align-items:center;margin-left:31px}
  .btn{font-family:var(--mono);font-size:13px;letter-spacing:.04em;background:var(--ember);color:var(--bg);
    border:none;border-radius:10px;padding:11px 18px;cursor:pointer;font-weight:700}
  .btn.ghost{background:var(--panel-2);color:var(--muted);border:1px solid var(--line);font-weight:400}
  .btn.ghost:hover{color:var(--ink);border-color:var(--ember-dim)}
  .btn:disabled{opacity:.4;cursor:default}

  /* report */
  .rsec{margin:22px 0}
  .rh{font-family:var(--mono);font-size:12px;letter-spacing:.12em;text-transform:uppercase;color:var(--ember);margin-bottom:12px}
  .trend{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:16px}
  .trendcap{font-size:12.5px;color:var(--muted);margin-top:10px}
  table.rt{width:100%;border-collapse:collapse;font-size:13px}
  table.rt th{font-family:var(--mono);font-size:10.5px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);
    text-align:left;padding:8px 10px;border-bottom:1px solid var(--line);font-weight:400}
  table.rt td{padding:9px 10px;border-bottom:1px solid var(--line)}
  table.rt tr:hover td{background:var(--panel-2)}
  .pill{font-family:var(--mono);font-size:10.5px;padding:2px 8px;border-radius:999px;border:1px solid var(--line);color:var(--muted)}
  .pill.hit{color:var(--ok);border-color:rgba(95,191,143,.4)}
  .pill.miss{color:var(--hot);border-color:rgba(224,107,86,.4)}
  .pill.slow{color:var(--ember);border-color:var(--ember-dim)}
  .rtag{font-family:var(--mono);color:var(--water)}
  .empty{color:var(--muted);font-size:14px;padding:24px 0;text-align:center}
  .fbar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px}
  .fbtn{font-family:var(--mono);font-size:11px;letter-spacing:.05em;text-transform:uppercase;background:var(--panel-2);
    color:var(--muted);border:1px solid var(--line);border-radius:999px;padding:7px 13px;cursor:pointer}
  .fbtn.on{background:var(--ember);color:var(--bg);border-color:var(--ember);font-weight:700}
  .dtag{font-family:var(--mono);font-size:11px;color:var(--muted)}

  @media (max-width:720px){
    .stats{grid-template-columns:repeat(2,1fr)}
    .secgrid{grid-template-columns:repeat(3,1fr)}
    .kwrow,.secgrid,.chrow,.opts,.nav,.step .hint{margin-left:0}
    h1.title{font-size:22px}
    table.rt th:nth-child(4),table.rt td:nth-child(4){display:none}
  }
</style>
</head>
<body>

<div class="wrap">
<a href="index.html" style="display:inline-block;margin:12px 0 0;font-family:ui-monospace,monospace;font-size:11px;letter-spacing:.05em;text-decoration:none;color:#8aa1bd;background:#0a2036;border:1px solid #1e3350;border-radius:999px;padding:6px 12px">← Command Center</a>
  <header class="top">
    <div class="eyebrow">CFPS · Command Center</div>
    <h1 class="title">Random Train · Report</h1>
    <div class="sub">문제 랜덤 출제 · 문제별 행동·시간 기록 · <b>찾는 시간 추이 추적</b></div>
    <div class="metaline">8개 도메인 기준 · Fire Protection Handbook · 두바이 <b>2026.8.23</b></div>
  </header>

  <div class="bar">
    <div class="tab on" data-t="train">Train</div>
    <div class="tab" data-t="report">Report</div>
    <div class="spring"></div>
    <div class="selwrap"><select id="secsel"></select></div>
    <button class="tab" id="bPause" title="타이머 일시정지">⏸ 정지</button>
    <div class="timer" id="timer">0:00</div>
  </div>

  <!-- TRAIN -->
  <section id="train" class="view on">
    <div class="stats">
      <div class="stat"><div class="v g" id="sSec">–</div><div class="l">Section Hit</div></div>
      <div class="stat"><div class="v g" id="sChap">–</div><div class="l">Chapter Hit</div></div>
      <div class="stat"><div class="v b" id="sAns">–</div><div class="l">Answer</div></div>
      <div class="stat"><div class="v e" id="sMed">–</div><div class="l">Median Find</div></div>
    </div>
    <div class="card" id="qcard"></div>
  </section>

  <!-- REPORT -->
  <section id="report" class="view">
    <div class="rsec">
      <div class="rh">찾는 시간 추이 — 세션별 중앙값(초)</div>
      <div class="trend">
        <div id="trendChart"></div>
        <div class="trendcap" id="trendCap"></div>
      </div>
    </div>
    <div class="stats" id="repStats"></div>
    <div class="rsec">
      <div class="rh">문제별 기록</div>
      <div class="fbar" id="fbar">
        <div class="fbtn on" data-f="all">전체</div>
        <div class="fbtn" data-f="slow">느림(느린 문제)</div>
        <div class="fbtn" data-f="chmiss">챕터 오판</div>
        <div class="fbtn" data-f="wrong">오답</div>
      </div>
      <div id="reptable"></div>
    </div>
    <div class="nav" style="margin-left:0">
      <button class="btn ghost" id="bExport">기록 내보내기 (JSON)</button>
      <button class="btn ghost" id="bReset">기록 초기화</button>
    </div>
  </section>
</div>

<script>
const QB  = [{"n":1,"s":1,"c":"1-1","p":"1-4","q":"The Triangle Shirtwaist Factory fire in New York City in 1911 resulted in the deaths of 146 garment workers because exits to staircases were locked. Which committee was created by NFPA as a direct result of this tragedy?","o":["Committee on Automatic Sprinkler Systems","Committee on Safety in Factories","Committee on Safety to Life","Committee on Staircase Safety"],"k":2},{"n":2,"s":1,"c":"1-1","p":"1-5","q":"Which of the eight components of the NFPA Fire & Life Safety Ecosystem requires that policy and a regulatory environment be created with a priority on public safety needs and not special interests?","o":["Government responsibility","Development and use of current codes","Reference standards","Investment in safety"],"k":0},{"n":3,"s":1,"c":"1-2","p":"1-9","q":"Which societal trend is most closely associated with increased fire and structural risks in urban areas?","o":["Aging Infrastructure","Urbanization & Population Growth","Climate Change","Technological Advancements"],"k":1},{"n":4,"s":1,"c":"1-2","p":"1-14","q":"Which of the following disasters requires retrofitting older buildings with seismic-resistant designs?","o":["Wildfires","Earthquakes","Floods","Tornadoes"],"k":1},{"n":5,"s":1,"c":"1-2","p":"1-15","q":"According to Richter Scale Magnitudes, for rating range 5.0-5.9, the expected effect is:","o":["Felt by some","Felt by most","Damaging shocks","Inflict serious damage"],"k":2},{"n":6,"s":1,"c":"1-2","p":"1-17","q":"According to the most common natural disaster is:","o":["Wildfires","Earthquakes","Floods","Tornadoes"],"k":2},{"n":7,"s":1,"c":"1-2","p":"1-21","q":"The data collection on fires in the United States is among some of the best in the world, it indicates a US fire department responds to a fire somewhere in the country","o":["Every 24 seconds","Every 45 seconds","Every 30 seconds","Every 60 seconds"],"k":0},{"n":8,"s":1,"c":"1-2","p":"1-21","q":"Property loss to fire in the United States estimated by the Insurance Services Offices is how many billion dollars for the year 2010?","o":["8.919","22.20","11.887","24"],"k":3},{"n":9,"s":1,"c":"1-2","p":"1-21","q":"Property loss to fire in the United States estimated by the Insurance Services Offices is how many billion dollars for the year 2019?","o":["8.919","22.20","11.887","37.1"],"k":3},{"n":10,"s":1,"c":"1-3","p":"1-33","q":"There are two general approaches used to write codes for the built environment; the first approach is to write prescriptive codes. What is the other general approach?","o":["Approval based","Minimum requirements","Maximum requirements","Performance based"],"k":3},{"n":11,"s":1,"c":"1-3","p":"1-28","q":"What was one of the key outcomes of the Great Fire of London in 1666","o":["The introduction of performance-based fire codes","The establishment of the National Fire Protection Association (NFPA)","The creation of the London Building Act, promoting fire-resistant construction","The development of fire-resistant electrical systems"],"k":2},{"n":12,"s":1,"c":"1-3","p":"1-34","q":"In the U.S., which entity typically has the authority to enforce fire codes and standards?","o":["The federal government","The insurance industry","The Authority Having Jurisdiction (AHJ)","The World Trade Organization (WTO)"],"k":2},{"n":13,"s":1,"c":"1-3","p":"1-32","q":"There are two broad categories of voluntary codes and standards: (1) safety codes and standards and (2) ...","o":["Local laws","Performance","Process","Product standards"],"k":3},{"n":14,"s":1,"c":"1-5","p":"1-54","q":"Which of the following types of fire prevention inspections is conducted to ensure that the occupancy, fire protection systems, and hazards protection are intact?","o":["Compliance inspection","Installation inspection","New construction inspection","Re-inspection"],"k":0},{"n":15,"s":1,"c":"1-5","p":"1-56","q":"Which of the following types of codes are based on a broad spectrum of accepted fire prevention experience?","o":["Expe  of Residential","o":["Transfer","Staggered","Interstitial","Closed web steel joist"],"k":1},{"n":455,"s":19,"c":"19-2","p":"19-41","q":"The __________ truss that creates a clear space on a lower floor by directly supporting the loads from columns above the truss or, at times, tension members below","o":["Transfer","Staggered","Interstitial","Closed web steel joist"],"k":0},{"n":456,"s":19,"c":"19-2","p":"19-42","q":"The __________ truss concept was developed primarily to solve the functional needs of hospitals","o":["Transfer","Staggered","Interstitial","Closed web steel joist"],"k":2},{"n":457,"s":20,"c":"20-1","p":"20-6","q":"If the travel distance to an exit in an unsprinklered New Educational Facility is 150 feet, what is the travel distance to a New Educational Facility if it is completely protected with standard supervised automatic sprinkler system?","o":["175 feet","225 feet","250 feet","200 feet"],"k":3},{"n":458,"s":20,"c":"20-1","p":"20-6","q":"What is the limit for travel distance for an existing assembly facility if it is unprotected by sprinkler system","o":["175 feet","225 feet","250 feet","200 feet"],"k":2},{"n":459,"s":20,"c":"20-1","p":"20-6","q":"What is the limit for travel distance for an existing Business facility if it is unprotected by sprinkler system","o":["175 feet","225 feet","250 feet","300 feet"],"k":3},{"n":460,"s":20,"c":"20-2","p":"20-23","q":"In Board and Care Facilities, Horizontal exits are often used to meet exit travel distance requirements in large facilities. Horizontal exits are formed by ......... hour fire barrier walls and may also be used as smoke barriers","o":["1 hr","1 1/2 hr","2 hr","30 mins"],"k":2},{"n":461,"s":20,"c":"20-3","p":"20-41","q":"The means of escape in lodging or rooming houses is defined as:","o":["A way out of a building that does not conform to the strict definition of means of egress, but does provide the safe way out","A clear path of travel, which can be both vertical and means of egress leading to public way or street","An unusual or archaic pathway that allows occupant to fire rated stairwell, smoke tower, or exit door","A convoluted or confusing pathway in a building design the adoption of building codes"],"k":0},{"n":462,"s":20,"c":"20-14","p":"20-171","q":"In health care occupancies, all shafts should be provided with fire-rated enclosure. Vertical openings connecting not more than three floors should be enclosed with fire barriers having minimum ______ hour fire resistance rating.","o":["2","3","1","2 if provided with mechanical stops"],"k":2},{"n":463,"s":20,"c":"20-5","p":"20-68","q":"What is the minimum width requirement for a window used as a second means of egress from a one or two family dwelling?","o":["22.4 inches (569 mm)","24.6 inches (625 mm)","32.4 inches (823 mm)","34.2 inches (869 mm)"],"k":3},{"n":464,"s":20,"c":"20-4","p":"20-59","q":"In designating the number and types of exits required for apartment buildings, NFPA 101 and NFPA 5000 determine the occupant load on the basis of ____________ of gross floor area, or the maximum probable population of any room or section under consideration, whichever is greater","o":["1 person/100 ft","1 person/200 ft","1 person/150 ft","1 person/250 ft"],"k":1}];
const SEC = {"1": "Codes & AHJ", "2": "Fire Science", "3": "Info & Analysis", "4": "Human Factors", "5": "FLS Education", "6": "Materials", "7": "Storage", "8": "Special Equipment", "9": "Processes", "10": "Building Services", "11": "Fire Prevention", "12": "Non-Emergency FD", "13": "Public Sector Response", "14": "Detection & Alarm", "15": "Water Supplies", "16": "Water-Based Suppression", "17": "Non-Water & Extinguishers", "18": "Confining Fires", "19": "Structural Fire Protection", "20": "Protecting Occupancies", "21": "Transportation"};
const CH  = {"14-1": "Fire Alarm Systems", "14-2": "Automatic Fire Detectors", "14-3": "Notification Appliances", "14-4": "System Interconnections", "14-5": "ITM of Fire Alarm Systems", "14-6": "Household Fire-Warning Equipment", "14-7": "Surveillance & Security Services", "14-8": "Gas and Vapor Detection", "14-9": "CO Detection in Residential", "14-10": "Security & Intrusion Detection"};
</script>
<script>
/* ---------- storage ---------- */
const KEY='cfps_train_v1';
let ST={log:[], session:0, lastSession:0};
try{const r=localStorage.getItem(KEY); if(r) ST=Object.assign(ST,JSON.parse(r));}catch(e){}
function save(){ try{localStorage.setItem(KEY,JSON.stringify(ST));}catch(e){} }
// start a new session id each app load
ST.session=(ST.lastSession||0)+1; ST.lastSession=ST.session; save();

const SLOW_MS=90000; // 90s = "slow" threshold (실전 오픈북 기준)
const $=id=>document.getElementById(id);
const fmt=ms=>{const s=Math.floor(ms/1000);return Math.floor(s/60)+':'+String(s%60).padStart(2,'0');};
const chLabel=c=>CH[c]?(c+' '+CH[c]):c;
// Chapters present in the bank are sparse (e.g. S12 only has 1,4,9,11,12,14,15).
// Return a CONTIGUOUS 1..max range so the picker shows every chapter, not just ones with questions.
const chList=s=>{
  let mx=0;
  QB.forEach(q=>{ if(q.s===s){ const n=+q.c.split('-')[1]; if(n>mx) mx=n; } });
  if(!mx) return [];                       // sections with no questions at all (S5, S21)
  const out=[]; for(let i=1;i<=mx;i++) out.push(s+'-'+i);
  return out;
};

/* ---------- section dropdown ---------- */
(function(){
  const sel=$('secsel'); const cnt={}; QB.forEach(q=>cnt[q.s]=(cnt[q.s]||0)+1);
  let h='<option value="all">전체 랜덤 ('+QB.length+')</option>';
  Object.keys(SEC).map(Number).sort((a,b)=>a-b).forEach(s=>{
    if(!cnt[s])return;
    h+='<option value="'+s+'">S'+s+' · '+SEC[s]+' ('+cnt[s]+')</option>';
  });
  sel.innerHTML=h; sel.value='all';
  sel.addEventListener('change',()=>{ buildQueue(); nextQuestion(); });
})();

/* ---------- queue (random) ---------- */
let queue=[], qptr=0, cur=null, tick=null, answered=false;
let pickSec=null, pickChap=null;
// pausable timer: accumulate elapsed while running
let accMs=0, runStart=0, paused=false;

function shuf(a){a=a.slice();for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function buildQueue(){
  const v=$('secsel').value;
  let p=QB.filter(q=>v==='all'||q.s===+v);
  queue=shuf(p); qptr=0;
}
function elapsed(){ return accMs + (paused||!runStart?0:(Date.now()-runStart)); }
function paintTimer(){
  const el=elapsed(), t=$('timer');
  t.textContent=fmt(el)+(paused?' ⏸':'');
  t.className='timer'+(paused?'':(el>SLOW_MS?' crit':el>SLOW_MS*0.6?' warn':''));
}
function timerStop(){ if(tick){clearInterval(tick);tick=null;} }
function timerStart(){
  accMs=0; paused=false; runStart=Date.now(); timerStop();
  updatePauseBtn();
  tick=setInterval(paintTimer,250); paintTimer();
}
function timerPauseToggle(){
  if(answered||!cur) return;               // no pause after answered or before first Q
  if(paused){ paused=false; runStart=Date.now(); }
  else { accMs=elapsed(); paused=true; runStart=0; }
  updatePauseBtn(); paintTimer();
}
function updatePauseBtn(){
  const b=$('bPause'); if(!b)return;
  b.textContent = paused ? '▶ 재개' : '⏸ 정지';
  b.classList.toggle('on', paused);
}

/* ---------- render one question ---------- */
function nextQuestion(){
  if(!queue.length) buildQueue();
  if(qptr>=queue.length){ buildQueue(); }
  cur=queue[qptr]; answered=false; pickSec=null; pickChap=null;
  renderCard(); timerStart(); refreshStats();
  $('kw') && $('kw').focus();
}

function renderCard(){
  const q=cur;
  const total=queue.length, pos=qptr+1;
  let h='';
  h+='<div class="qhead">';
  h+='<span class="qn">Q '+q.n+'</span>';
  h+='<span class="qtag">'+pos+' / '+total+'</span>';
  h+='<span class="qtag hide" id="loc">? · ? · ?</span>';
  h+='</div>';
  h+='<div class="qbody">'+esc(q.q)+'</div>';

  // step 1: keyword
  h+='<div class="step"><div class="sh"><span class="num">1</span><span class="st">검색 키워드</span></div>';
  h+='<div class="hint">색인에서 찾을 단어 하나. 영어로. Enter.</div>';
  h+='<div class="kwrow"><input id="kw" autocomplete="off" spellcheck="false" placeholder="type keyword…"></div></div>';

  // step 2: section guess
  h+='<div class="step"><div class="sh"><span class="num">2</span><span class="st">어느 섹션?</span></div>';
  h+='<div class="hint">보기 보기 전에 확정. 훔쳐보기 금지.</div><div class="secgrid" id="secgrid">';
  Object.keys(SEC).map(Number).sort((a,b)=>a-b).forEach(s=>{
    h+='<button class="secbtn" data-s="'+s+'"><div class="bn">'+s+'</div><div class="bl">'+SEC[s]+'</div></button>';
  });
  h+='</div></div>';

  // step 3: chapter guess — HIDDEN until a section is chosen; title carries NO section number
  h+='<div class="step" id="step3" style="display:none"><div class="sh"><span class="num">3</span><span class="st" id="step3title">어느 챕터?</span></div>';
  h+='<div class="hint">얼추 맞으면 됨 — 그게 탭을 붙인 이유.</div><div class="chrow" id="chrow"></div></div>';

  // step 4: answer — HIDDEN until a chapter is chosen
  h+='<div class="step" id="step4" style="display:none"><div class="sh"><span class="num">4</span><span class="st">이제 답</span></div>';
  h+='<div class="hint">아래 페이지를 책에서 펴고 찾으세요. 기억으로 찍지 말 것.</div><div class="opts" id="opts">';
  q.o.forEach((txt,i)=>{
    h+='<button class="opt" data-i="'+i+'"><span class="ltr">'+String.fromCharCode(65+i)+'</span><span>'+esc(txt)+'</span></button>';
  });
  h+='</div></div>';

  h+='<div class="verdict" id="verdict"></div>';
  h+='<div class="nav"><button class="btn" id="bNext" disabled>다음 문항 →</button>'
    +'<button class="btn ghost" id="bSkip">스킵</button></div>';

  $('qcard').innerHTML=h;

  // bind keyword
  $('kw').addEventListener('keydown',e=>{ if(e.key==='Enter'&&$('kw').value.trim()){ $('kw').blur(); } });

  // section guess → reveal step 3
  $('secgrid').querySelectorAll('.secbtn').forEach(b=>{
    b.addEventListener('click',()=>{
      if(answered)return;
      pickSec=+b.dataset.s;
      $('secgrid').querySelectorAll('.secbtn').forEach(x=>x.classList.remove('sel'));
      b.classList.add('sel');
      revealStep3();
    });
  });
  // answer
  $('opts').querySelectorAll('.opt').forEach(b=>{
    b.addEventListener('click',()=>{ if(!answered) grade(+b.dataset.i); });
  });
  $('bNext').addEventListener('click',()=>{ qptr++; nextQuestion(); });
  $('bSkip').addEventListener('click',()=>{ timerStop(); qptr++; nextQuestion(); });
}

// build chapter buttons only after section is picked, then reveal step 3
function revealStep3(){
  // Use the section SHE picked — not the correct one. Using q.s would leak the
  // right section whenever her guess was wrong.
  const s=pickSec;
  $('step3title').textContent = 'S'+s+'의 어느 챕터?';
  const chs=chList(s);
  const row=$('chrow');
  if(!chs.length){
    // no chapter data for this section (S5 / S21 have no questions in the bank)
    row.innerHTML='<button class="chbtn" data-c=""><b>?</b>챕터 정보 없음 — 계속</button>';
  }else{
    let h='';
    chs.forEach(c=>{ h+='<button class="chbtn" data-c="'+c+'"><b>'+c+'</b>'+(CH[c]||'')+'</button>'; });
    row.innerHTML=h;
  }
  row.querySelectorAll('.chbtn').forEach(b=>{
    b.addEventListener('click',()=>{
      if(answered)return;
      pickChap=b.dataset.c||null;
      row.querySelectorAll('.chbtn').forEach(x=>x.classList.remove('sel'));
      b.classList.add('sel');
      revealStep4();
    });
  });
  $('step3').style.display='';
  $('step3').scrollIntoView({behavior:'smooth',block:'nearest'});
}
// reveal answer options only after chapter is picked
function revealStep4(){
  $('step4').style.display='';
  $('step4').scrollIntoView({behavior:'smooth',block:'nearest'});
}

/* ---------- grading + LOGGING (this is what persists to Report) ---------- */
function grade(ansIdx){
  const el=elapsed();               // capture before stopping
  answered=true; paused=false; runStart=0; timerStop(); updatePauseBtn();
  const q=cur;
  const secHit = pickSec===q.s;
  const chHit  = pickChap===q.c;
  const ansHit = ansIdx===q.k;

  // reveal location tag
  $('loc').className='qtag'; $('loc').textContent='S'+q.s+' · '+q.c+' · p.'+q.p;

  // color section buttons
  $('secgrid').querySelectorAll('.secbtn').forEach(b=>{
    const s=+b.dataset.s;
    if(s===q.s) b.classList.add('right');
    else if(pickSec===s) b.classList.add('wrong');
  });
  // color chapter buttons
  $('chrow').querySelectorAll('.chbtn').forEach(b=>{
    const c=b.dataset.c;
    if(c===q.c) b.classList.add('right');
    else if(pickChap===c) b.classList.add('wrong');
  });
  // color options
  $('opts').querySelectorAll('.opt').forEach(b=>{
    const i=+b.dataset.i; b.disabled=true;
    if(i===q.k) b.classList.add('right');
    else if(i===ansIdx) b.classList.add('wrong');
  });

  // verdict
  const kw=($('kw').value||'').trim();
  let v='';
  v+='<div class="vrow"><span class="vk">Keyword</span><span class="vv"><b>'+(kw||'—')+'</b></span></div>';
  v+='<div class="vrow"><span class="vk">Section</span><span class="vv">'+(secHit?'<span class="hit">HIT</span>':'<span class="miss">MISS</span>')
    +' · 내 답 '+(pickSec?('S'+pickSec):'—')+' · 정답 <b>S'+q.s+' '+SEC[q.s]+'</b></span></div>';
  v+='<div class="vrow"><span class="vk">Chapter</span><span class="vv">'+(chHit?'<span class="hit">HIT</span>':'<span class="miss">MISS</span>')
    +' · 내 답 '+(pickChap||'—')+' · 정답 <b>'+chLabel(q.c)+'</b></span></div>';
  v+='<div class="vrow"><span class="vk">Answer</span><span class="vv">'+(ansHit?'<span class="hit">정답</span>':'<span class="miss">오답</span>')
    +'</span></div>';
  v+='<div class="vpage">Vol → '+q.c+' → p.'+q.p+' 펴서 찾으세요.</div>';
  v+='<div class="vtime">이 문제 소요 <b>'+fmt(el)+'</b>'+(el>SLOW_MS?' · <span style="color:var(--ember)">느림 플래그</span>':'')+'</div>';
  const vd=$('verdict'); vd.innerHTML=v; vd.classList.add('show');
  $('bNext').disabled=false;

  // ---- persist ----
  ST.log.push({
    n:q.n, s:q.s, c:q.c, p:q.p, ts:Date.now(), sess:ST.session,
    ms:el, void:false, secHit, chHit, ansHit,
    kw, pickSec, pickChap:pickChap||null, ansIdx
  });
  save();
  refreshStats();
}

/* ---------- live stats (current session) ---------- */
function refreshStats(){
  const s=ST.log.filter(r=>r.sess===ST.session && !r.void);
  const done=s.length;
  const pct=x=>done?Math.round(100*x/done)+'%':'–';
  $('sSec').textContent = done?pct(s.filter(r=>r.secHit).length):'–';
  $('sChap').textContent= done?pct(s.filter(r=>r.chHit).length):'–';
  $('sAns').textContent = done?pct(s.filter(r=>r.ansHit).length):'–';
  const times=s.map(r=>r.ms).sort((a,b)=>a-b);
  $('sMed').textContent = times.length ? (median(times)/1000).toFixed(1)+'s' : '–';
}
function median(a){if(!a.length)return 0;const m=Math.floor(a.length/2);return a.length%2?a[m]:(a[m-1]+a[m])/2;}

/* ---------- REPORT ---------- */
let repFilter='all';
function renderReport(){
  const log=ST.log.filter(r=>!r.void);   // voided records excluded from all metrics
  const voided=ST.log.length-log.length;
  const done=log.length;
  const secHit=log.filter(r=>r.secHit).length, chHit=log.filter(r=>r.chHit).length, ansHit=log.filter(r=>r.ansHit).length;
  const allT=log.map(r=>r.ms).sort((a,b)=>a-b);
  $('repStats').innerHTML=
    card(done+(voided?' <span style="font-size:13px;color:var(--muted)">(+'+voided+' 무효)</span>':''),'n','풀이 수')+
    card(done?Math.round(100*secHit/done)+'%':'–','g','Section Hit')+
    card(done?Math.round(100*chHit/done)+'%':'–','g','Chapter Hit')+
    card(allT.length?(median(allT)/1000).toFixed(1)+'s':'–','e','전체 중앙값');

  drawTrend();
  drawTable();
}
function card(v,cls,l){return '<div class="stat"><div class="v '+cls+'">'+v+'</div><div class="l">'+l+'</div></div>';}

function drawTrend(){
  // group by session -> median find time (sec)
  const bySess={};
  ST.log.forEach(r=>{ if(r.void)return; (bySess[r.sess]=bySess[r.sess]||[]).push(r.ms);});
  const rows=Object.keys(bySess).map(Number).sort((a,b)=>a-b)
    .map(se=>({sess:se, n:bySess[se].length, med:median(bySess[se].slice().sort((a,b)=>a-b))/1000}))
    .filter(r=>r.n>0);
  if(rows.length<1){ $('trendChart').innerHTML='<div class="empty">아직 기록이 없습니다. Train에서 몇 문제 풀면 세션별 추이가 그려집니다.</div>'; $('trendCap').textContent=''; return;}
  // svg line chart
  const W=Math.min(1080, Math.max(360, rows.length*90)), H=180, pad=34;
  const maxV=Math.max(...rows.map(r=>r.med),1)*1.15;
  const x=i=>pad+(rows.length<=1?(W-2*pad)/2:i*(W-2*pad)/(rows.length-1));
  const y=v=>H-pad-(v/maxV)*(H-2*pad);
  let pts=rows.map((r,i)=>x(i)+','+y(r.med)).join(' ');
  let svg='<svg viewBox="0 0 '+W+' '+H+'" width="100%" style="max-width:'+W+'px">';
  // grid baseline
  svg+='<line x1="'+pad+'" y1="'+(H-pad)+'" x2="'+(W-pad)+'" y2="'+(H-pad)+'" stroke="#1e3350"/>';
  // area/line
  if(rows.length>1) svg+='<polyline points="'+pts+'" fill="none" stroke="#f2a154" stroke-width="2.5"/>';
  rows.forEach((r,i)=>{
    svg+='<circle cx="'+x(i)+'" cy="'+y(r.med)+'" r="5" fill="#0b1622" stroke="#f2a154" stroke-width="2.5"/>';
    svg+='<text x="'+x(i)+'" y="'+(y(r.med)-12)+'" fill="#e8eef6" font-size="12" font-family="monospace" text-anchor="middle">'+r.med.toFixed(1)+'s</text>';
    svg+='<text x="'+x(i)+'" y="'+(H-pad+18)+'" fill="#8aa1bd" font-size="11" font-family="monospace" text-anchor="middle">S'+r.sess+' ('+r.n+')</text>';
  });
  svg+='</svg>';
  $('trendChart').innerHTML=svg;
  const first=rows[0].med, last=rows[rows.length-1].med;
  let cap;
  if(rows.length<2) cap='세션이 하나뿐입니다. 다음 세션이 쌓이면 찾는 시간이 줄어드는지 비교됩니다.';
  else{
    const diff=(first-last), pctd=first?Math.round(100*diff/first):0;
    cap = diff>0 ? ('첫 세션 대비 중앙값 '+diff.toFixed(1)+'s 단축 ('+pctd+'% 개선). 찾는 속도가 붙고 있습니다.')
        : ('첫 세션 대비 '+Math.abs(diff).toFixed(1)+'s 증가. 아직 속도가 안정화되지 않았습니다 — 원인(챕터 오판/오타/개념)이 뭔지 아래 표에서 확인하세요.');
  }
  $('trendCap').textContent=cap;
}

function drawTable(){
  // keep original index so void toggle targets the right record
  let rows=ST.log.map((r,i)=>({r,i})).reverse();
  if(repFilter==='slow')   rows=rows.filter(o=>o.r.ms>SLOW_MS);
  if(repFilter==='chmiss') rows=rows.filter(o=>!o.r.chHit);
  if(repFilter==='wrong')  rows=rows.filter(o=>!o.r.ansHit);
  if(!rows.length){ $('reptable').innerHTML='<div class="empty">해당 조건의 기록이 없습니다.</div>'; return; }
  let h='<table class="rt"><thead><tr><th>Q</th><th>위치</th><th>시간</th><th>키워드</th><th>Sec</th><th>Chap</th><th>Ans</th><th>세션</th><th></th></tr></thead><tbody>';
  rows.forEach(o=>{
    const r=o.r, slow=r.ms>SLOW_MS, vd=r.void;
    h+='<tr'+(vd?' style="opacity:.45;text-decoration:line-through"':'')+'>';
    h+='<td class="rtag">Q'+r.n+'</td>';
    h+='<td class="dtag">S'+r.s+' · '+r.c+' · p.'+r.p+'</td>';
    h+='<td class="dtag">'+fmt(r.ms)+(slow&&!vd?' <span class="pill slow">느림</span>':'')+'</td>';
    h+='<td class="dtag">'+(r.kw?esc(r.kw):'—')+'</td>';
    h+='<td>'+(r.secHit?'<span class="pill hit">HIT</span>':'<span class="pill miss">MISS</span>')+'</td>';
    h+='<td>'+(r.chHit?'<span class="pill hit">HIT</span>':'<span class="pill miss">MISS</span>')+'</td>';
    h+='<td>'+(r.ansHit?'<span class="pill hit">O</span>':'<span class="pill miss">X</span>')+'</td>';
    h+='<td class="dtag">S'+r.sess+'</td>';
    h+='<td><button class="fbtn voidbtn" data-i="'+o.i+'" title="'+(vd?'기록 복구':'이 기록 무효 처리')+'" style="text-decoration:none;padding:4px 9px">'+(vd?'복구':'무효')+'</button></td>';
    h+='</tr>';
  });
  h+='</tbody></table>';
  $('reptable').innerHTML=h;
  // bind void toggles
  $('reptable').querySelectorAll('.voidbtn').forEach(b=>{
    b.addEventListener('click',()=>{
      const i=+b.dataset.i;
      if(ST.log[i]){ ST.log[i].void=!ST.log[i].void; save(); renderReport(); }
    });
  });
}

$('fbar').querySelectorAll('.fbtn').forEach(b=>{
  b.addEventListener('click',()=>{
    repFilter=b.dataset.f;
    $('fbar').querySelectorAll('.fbtn').forEach(x=>x.classList.toggle('on',x===b));
    drawTable();
  });
});
$('bReset').addEventListener('click',()=>{
  if(!confirm('모든 학습 기록을 지웁니다. 계속할까요?'))return;
  ST={log:[],session:1,lastSession:1}; save(); renderReport(); refreshStats();
});
$('bExport').addEventListener('click',()=>{
  const blob=new Blob([JSON.stringify(ST.log,null,2)],{type:'application/json'});
  const a=document.createElement('a'); a.href=URL.createObjectURL(blob);
  a.download='cfps_train_log.json'; a.click();
});

/* ---------- tabs ---------- */
document.querySelectorAll('.tab[data-t]').forEach(t=>{
  t.addEventListener('click',()=>{
    const v=t.dataset.t;
    document.querySelectorAll('.tab[data-t]').forEach(x=>x.classList.toggle('on',x===t));
    document.querySelectorAll('.view').forEach(s=>s.classList.toggle('on',s.id===v));
    if(v==='report'){ if(!paused) timerStop(); renderReport(); }
    else { if(!paused && cur && !answered){ timerStop(); tick=setInterval(paintTimer,250); } paintTimer(); }
  });
});

/* ---------- pause ---------- */
$('bPause').addEventListener('click', timerPauseToggle);
// spacebar toggles pause, but not while typing in the keyword box
document.addEventListener('keydown', e=>{
  if(e.code==='Space' && document.activeElement!==$('kw') && $('train').classList.contains('on')){
    e.preventDefault(); timerPauseToggle();
  }
});

/* ---------- util ---------- */
function esc(s){return String(s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}

/* ---------- go ---------- */
buildQueue(); nextQuestion();
</script>
